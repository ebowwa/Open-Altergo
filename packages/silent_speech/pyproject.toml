[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "open-altergo-silent-speech"
version = "0.1.0"
description = "Interface-neutral silent-speech service for Open-Altergo"
readme = "README.md"
requires-python = ">=3.11"

[tool.setuptools.packages.find]
where = ["src"]
